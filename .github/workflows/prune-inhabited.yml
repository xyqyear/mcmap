name: Prune-inhabited integration tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build mcmap binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: prune-inhabited-build

      - name: Build release binary
        run: cargo build --release

      - name: Upload mcmap binary
        uses: actions/upload-artifact@v7
        with:
          name: mcmap-bin-prune-inhabited
          path: target/release/mcmap
          if-no-files-found: error
          retention-days: 1

  prune-inhabited:
    name: ${{ matrix.flavor }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - vanilla-1.7.10
          - vanilla-1.12.2
          - vanilla-1.13.2
          - vanilla-1.14.4
          - vanilla-1.15.2
          - vanilla-1.16.5
          - vanilla-1.17.1
          - vanilla-1.18.2
          - vanilla-1.19.4
          - vanilla-1.20.6
          - vanilla-1.21.1
          - vanilla-1.21.8
          - vanilla-latest

    env:
      MCMAP_INTEGRATION_TESTS: "1"
      MCMAP_FLAVOR: ${{ matrix.flavor }}
      MCMAP_TEST_CACHE: /tmp/mcmap-test-cache
      MCMAP_BIN: ${{ github.workspace }}/mcmap-bin/mcmap
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Download mcmap binary
        uses: actions/download-artifact@v8
        with:
          name: mcmap-bin-prune-inhabited
          path: mcmap-bin

      - name: Make mcmap executable
        run: chmod +x "$MCMAP_BIN"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: tests/integration/pyproject.toml

      - name: Restore mcmap-test-cache
        uses: actions/cache@v5
        with:
          path: /tmp/mcmap-test-cache
          key: mcmap-prune-cache-${{ matrix.flavor }}-${{ hashFiles('tests/integration/cache.py', 'tests/integration/server.py', 'tests/integration/mcclient.py', 'tests/integration/test_prune_inhabited.py') }}
          restore-keys: |
            mcmap-prune-cache-${{ matrix.flavor }}-

      - name: Run prune-inhabited integration tests
        working-directory: tests/integration
        run: uv run pytest -ra test_prune_inhabited.py

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: prune-server-logs-${{ matrix.flavor }}
          path: |
            /tmp/mcmap-test-run-*/**/server.log
            /tmp/mcmap-test-run-*/**/preboot.log
            /tmp/mcmap-test-run-*/**/server.properties
            /tmp/mcmap-test-run-*/**/logs/**
          if-no-files-found: ignore
          retention-days: 7
