name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Must already exist in the repo, or will be created on the current commit."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        id: package
        shell: bash
        run: |
          project_name="${{ github.event.repository.name }}"
          dirname="${project_name}-${TAG}-${{ matrix.target }}"
          mkdir "$dirname"

          if [ "${{ runner.os }}" = "Windows" ]; then
            mv "target/${{ matrix.target }}/release/${project_name}.exe" "$dirname/"
            7z a "${dirname}.zip" "$dirname" >/dev/null
            echo "asset=${dirname}.zip" >> "$GITHUB_OUTPUT"
          else
            mv "target/${{ matrix.target }}/release/${project_name}" "$dirname/"
            tar -czf "${dirname}.tar.gz" "$dirname"
            echo "asset=${dirname}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release and upload artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          files: ${{ steps.package.outputs.asset }}
          fail_on_unmatched_files: true
